{% extends 'base.html' %}
{% block titulo %}Recuperar Senha - HiddenTreasures{% endblock titulo %}

{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock css %}

{% block conteudo %}

<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card shadow p-4">

            <h3 class="text-center mb-3">Recuperar Senha</h3>

            <p class="text-center text-muted">
                Digite seu email para receber o link de redefinição.
            </p>

            <form method="POST" action="{{ url_for('historico_senhas.recuperar_senha') }}">

                <div class="mb-3">
                    <label>Email <span class="text-danger">*</span></label>
                    <input name="email" type="email" class="form-control" required>
                </div>

                <button class="btn btn-primary w-100">
                    Enviar link
                </button>

            </form>

            <p class="text-center mt-3">
                <a href="{{ url_for('user.login') }}">Voltar ao login</a>
            </p>

        </div>
    </div>
</div>

{% endblock conteudo %}
