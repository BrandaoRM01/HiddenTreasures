{% extends 'base.html' %}
{% block titulo %}Editar Ecossistema - HiddenTreasures{% endblock titulo %}

{% block conteudo %}

<div class="container mt-4">

    <div class="text-center mb-5">
        <h1 class="fw-bold">Editar Ecossistema</h1>
    </div>

    <div class="card shadow p-4">

        <form method="POST" action="{{ url_for('ecossistemas.atualizar_ecossistema', id=ecossistema.id) }}">

            <div class="mb-3">
                <label for="nome" class="form-label">
                    Nome do Ecossistema <span class="text-danger">*</span>
                </label>
                <input type="text" id="nome" name="nome" class="form-control" value="{{ ecossistema.nome }}" required>
            </div>

            <div class="d-flex gap-2">

                <button type="submit" class="btn btn-primary w-100">
                    Salvar Alterações
                </button>

                <a href="{{ url_for('ecossistemas.gerenciar_ecossistemas') }}" class="btn btn-secondary w-100">
                    Cancelar
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock conteudo %}
