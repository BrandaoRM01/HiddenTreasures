{% extends 'base.html' %}
{% block titulo %}Editar Promoção - HiddenTreasures{% endblock titulo %}

{% block conteudo %}

<div class="container mt-4">

    <div class="text-center mb-5">
        <h1 class="fw-bold">Editar Promoção</h1>
    </div>

    <div class="card p-4 shadow">
        <form method="POST" action="{{ url_for('promocoes.editar_promocao', id=promocao.id) }}">

            <div class="mb-3">
                <label for="titulo" class="form-label">
                    Título da Promoção <span class="text-danger">*</span>
                </label>
                <input id="titulo" name="titulo" type="text" class="form-control" value="{{ promocao.titulo }}"
                    placeholder="Digite o título da promoção" required>
            </div>

            <div class="mb-3">
                <label for="descricao" class="form-label">
                    Descrição
                </label>
                <textarea id="descricao" name="descricao" class="form-control" rows="3"
                    placeholder="Descreva a promoção">{{ promocao.descricao }}</textarea>
            </div>

            <div class="mb-3">
                <label for="desconto" class="form-label">
                    Desconto (%) <span class="text-danger">*</span>
                </label>
                <input id="desconto" name="desconto" type="number" step="0.01" class="form-control"
                    value="{{ promocao.desconto }}" placeholder="Ex: 10" required>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="data_inicio" class="form-label">
                            Data de Início <span class="text-danger">*</span>
                        </label>
                        <input id="data_inicio" name="data_inicio" type="date" class="form-control"
                            value="{{ promocao.data_inicio.strftime('%Y-%m-%d') }}" required>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="data_fim" class="form-label">
                            Data de Fim <span class="text-danger">*</span>
                        </label>
                        <input id="data_fim" name="data_fim" type="date" class="form-control"
                            value="{{ promocao.data_fim.strftime('%Y-%m-%d') }}" required>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-2 mt-3">
                <button type="submit" class="btn btn-primary w-100">
                    Salvar Alterações
                </button>

                <a href="{{ url_for('promocoes.gerenciar_promocoes') }}" class="btn btn-secondary w-100">
                    Cancelar
                </a>
            </div>

        </form>

    </div>

</div>

{% endblock conteudo %}
