{% extends 'base.html' %}
{% block titulo %}Editar Perfil - HiddenTreasures{% endblock titulo %}

{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock css %}

{% block conteudo %}

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow p-4">

            <h3 class="text-center mb-3">Editar Perfil</h3>

            <div class="text-center mb-4">
                <p class="text-muted mb-1 small">Conta vinculada</p>
                <p class="fw-semibold mb-0">
                    <i class="bi bi-envelope me-1"></i>
                    {{ session['usuario']['email'] }}
                </p>
            </div>

            <form method="POST" enctype="multipart/form-data" action="{{ url_for('user.editar_perfil') }}">

                <div class="text-center mb-4">
                    <img id="preview-imagem" src="{{ url_for('static', filename=session['usuario']['url_foto']) }}"
                        class="rounded-circle shadow"
                        style="width: 110px; height: 110px; object-fit: cover; object-position: top; cursor: pointer;">

                    <input name="foto" type="file" hidden id="foto-imagem" accept="image/*">

                    <div class="mt-2">
                        <label class="btn btn-outline-primary btn-sm me-2" for="foto-imagem">
                            <i class="bi bi-upload"></i> Trocar foto
                        </label>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Username <span class="text-danger">*</span></label>
                    <input name="username" type="text" class="form-control"
                        value="{{ session['usuario']['username'] }}">
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nova senha</label>
                        <input name="senha" type="password" class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Confirmar senha</label>
                        <input name="confirmar_senha" type="password" class="form-control">
                    </div>
                </div>

                <button class="btn btn-primary w-100 mt-2">Salvar Alterações</button>

            </form>

        </div>
    </div>
</div>

{% endblock conteudo %}

{% block js %}
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% endblock js %}
