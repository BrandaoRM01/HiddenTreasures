{% extends 'base.html' %}
{% block titulo %}Editar Destaque - HiddenTreasures{% endblock titulo %}

{% block conteudo %}

<div class="container mt-4">

    <div class="text-center mb-5">
        <h1 class="fw-bold">Editar Destaque</h1>
    </div>

    <div class="card shadow p-4">

        <form method="POST" action="{{ url_for('destaques.atualizar_destaque', id=destaque.id) }}">

            <div class="mb-3">
                <label for="nome" class="form-label">
                    Nome do Destaque <span class="text-danger">*</span>
                </label>

                <input type="text" id="nome" name="nome" class="form-control" value="{{ destaque.nome }}" required>
            </div>

            <div class="d-flex gap-2">

                <button type="submit" class="btn btn-primary w-100">
                    Salvar Alterações
                </button>

                <a href="{{ url_for('destaques.gerenciar_destaques') }}" class="btn btn-secondary w-100">
                    Cancelar
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock conteudo %}
