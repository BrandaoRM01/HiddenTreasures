{% extends 'base.html' %}
{% block titulo %}Cadastro - HiddenTreasures{% endblock titulo %}

{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock css %}

{% block conteudo %}

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-7">
        <div class="card shadow p-4">

            <h3 class="text-center mb-4">Cadastro</h3>

            <form method="POST" enctype="multipart/form-data" action="{{ url_for('user.cadastro') }}">

                <div class="row align-items-start mb-3">

                    <div class="col-md-4 text-center">
                        <img id="preview-imagem" src="{{ url_for('static', filename='img/default/user_foto.webp') }}"
                            class="rounded-circle shadow"
                            style="width: 100px; height: 100px; object-fit: cover; object-position: top; cursor: pointer;">

                        <input name="foto" type="file" hidden id="foto-imagem" accept="image/*">

                        <label class="btn btn-outline-primary btn-sm mt-2">
                            <i class="bi bi-upload"></i> Carregar foto
                        </label>
                    </div>

                    <div class="col-md-8">

                        <div class="mb-3">
                            <label>Username <span class="text-danger">*</span></label>
                            <input name="username" type="text" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Email <span class="text-danger">*</span></label>
                            <input name="email" type="email" class="form-control">
                        </div>

                    </div>

                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Senha <span class="text-danger">*</span></label>
                        <input name="senha" type="password" class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Confirmar senha <span class="text-danger">*</span></label>
                        <input name="confirmar_senha" type="password" class="form-control">
                    </div>
                </div>

                <button class="btn btn-primary w-100">Cadastrar</button>

            </form>

            <p class="text-center mt-3">
                Já tem conta? <a href="{{ url_for('user.login') }}">Entrar</a>
            </p>

        </div>
    </div>
</div>

{% endblock conteudo %}

{% block js %}
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% endblock js %}
