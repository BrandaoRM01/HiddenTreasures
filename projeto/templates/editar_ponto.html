{% extends 'base.html' %}
{% block titulo %}Editar Ponto Turístico - HiddenTreasures{% endblock titulo %}

{% block conteudo %}

<div class="container mt-4">
    <div class="text-center mb-5">
        <h1 class="fw-bold">Editar Ponto Turístico</h1>
    </div>

    <div class="card p-4 mb-4 shadow">

        <form method="POST" enctype="multipart/form-data" action="{{ url_for('pontos.editar_ponto', id=ponto.id) }}">

            <div class="text-center mb-4">
                <img id="preview-imagem"
                    src="{{ url_for('static', filename=ponto.url_imagem or 'img/default/hidden_treasures_logo.png') }}"
                    class="rounded shadow" style="width: 150px; height: 150px; object-fit: cover; cursor: pointer;">

                <input name="foto" type="file" hidden id="foto-imagem" accept="image/*">

                <div class="mt-2">
                    <label class="btn btn-outline-primary btn-sm mt-2" for="foto-imagem">
                        <i class="bi bi-upload"></i> Trocar foto
                    </label>
                </div>
            </div>

            <div class="mb-3">
                <label for="nome" class="form-label">
                    Nome do Ponto <span class="text-danger">*</span>
                </label>
                <input id="nome" name="nome" type="text" class="form-control" value="{{ ponto.nome }}" required>
            </div>

            <div class="mb-3">
                <label for="localizacao" class="form-label">
                    Localização <span class="text-danger">*</span>
                </label>
                <input id="localizacao" name="localizacao" type="text" class="form-control"
                    value="{{ ponto.localizacao }}" required>
            </div>

            <div class="mb-3">
                <label for="descricao" class="form-label">
                    Descrição <span class="text-danger">*</span>
                </label>
                <textarea id="descricao" name="descricao" class="form-control" rows="3"
                    required>{{ ponto.descricao }}</textarea>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="horario_funcionamento" class="form-label">
                            Horário de Funcionamento
                        </label>
                        <input id="horario_funcionamento" name="horario_funcionamento" type="text" class="form-control"
                            value="{{ ponto.horario_funcionamento }}">
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="custo_entrada" class="form-label">
                            Custo de Entrada (R$)
                        </label>
                        <input id="custo_entrada" name="custo_entrada" type="text" class="form-control"
                            value="{{ ponto.custo_entrada }}">
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="promocao" class="form-label">
                    Promoção
                </label>
                <select id="promocao" name="promocao" class="form-control">
                    <option value="">Nenhuma</option>
                    {% for promocao in lista_promocoes %}
                    <option value="{{ promocao.id }}" {% if ponto.promocao.id==promocao.id %}selected{% endif %}>
                        {{ promocao.titulo }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="categoria" class="form-label">
                    Categoria <span class="text-danger">*</span>
                </label>
                <select id="categoria" name="categoria" class="form-control" required>
                    <option value="">Selecione a categoria</option>
                    {% for categoria in lista_categorias %}
                    <option value="{{ categoria.id }}" {% if ponto.categoria.id==categoria.id %}selected{% endif %}>
                        {{ categoria.nome }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="tipo_ponto" class="form-label">
                    Tipo do Ponto <span class="text-danger">*</span>
                </label>

                <select id="tipo_ponto" name="tipo_ponto" class="form-control" required>

                    <option value="cultural" {% if ponto.tipo_ponto()=='cultural' %}selected{% endif %}>
                        Ponto Cultural
                    </option>

                    <option value="natural" {% if ponto.tipo_ponto()=='natural' %}selected{% endif %}>
                        Ponto Natural
                    </option>

                </select>
            </div>

            <div id="campos-natural">

                <div class="mb-3">
                    <label for="ecossistema" class="form-label">
                        Ecossistema
                    </label>

                    <select id="ecossistema" name="ecossistema" class="form-control">

                        <option value="">Selecione um ecossistema</option>

                        {% for ecossistema in lista_ecossistemas %}
                        <option value="{{ ecossistema.id }}" {% if ponto.ecossistema and
                            ponto.ecossistema.id==ecossistema.id %} selected {% endif %}>
                            {{ ecossistema.nome }}
                        </option>
                        {% endfor %}

                    </select>
                </div>

                <div class="mb-3">
                    <label for="area_km" class="form-label">
                        Área (km²)
                    </label>

                    <input id="area_km" name="area_km" type="number" step="0.01" class="form-control"
                        placeholder="Ex: 125.50" value="{{ ponto.area_km or '' }}">
                </div>

            </div>

            <div id="campos-cultural" class="d-none">

                <div class="mb-3">
                    <label for="tipo_cultural" class="form-label">
                        Tipo Cultural
                    </label>

                    <select id="tipo_cultural" name="tipo_cultural" class="form-control">

                        <option value="">Selecione um tipo</option>

                        {% for tipo in lista_tipos_culturais %}
                        <option value="{{ tipo.id }}" {% if ponto.tipo_cultural and ponto.tipo_cultural.id==tipo.id %}
                            selected {% endif %}>
                            {{ tipo.nome }}
                        </option>
                        {% endfor %}

                    </select>
                </div>

                <div class="mb-3">
                    <label for="ano_fundacao" class="form-label">
                        Ano de Fundação
                    </label>

                    <input id="ano_fundacao" name="ano_fundacao" class="form-control" placeholder="Ex: 1895"
                        value="{{ ponto.ano_fundacao or '' }}">
                </div>

            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary w-100">
                    Salvar Alterações
                </button>

                <a href="{{ url_for('pontos.gerenciar_pontos') }}" class="btn btn-secondary w-100">
                    Cancelar
                </a>
            </div>

        </form>
    </div>
</div>

{% endblock conteudo %}
