{% extends 'base.html' %}
{% block titulo %}Redefinir Senha - HiddenTreasures{% endblock titulo %}

{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock css %}

{% block conteudo %}

<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card shadow p-4">

            <h3 class="text-center mb-3">Redefinir Senha</h3>

            <form method="POST">

                <div class="mb-3">
                    <label>Nova senha <span class="text-danger">*</span></label>
                    <input name="senha" type="password" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Confirmar senha <span class="text-danger">*</span></label>
                    <input name="confirmar_senha" type="password" class="form-control" required>
                </div>

                <button class="btn btn-primary w-100">
                    Alterar senha
                </button>

            </form>

        </div>
    </div>
</div>

{% endblock conteudo %}
